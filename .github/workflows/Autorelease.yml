name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (z.B. 1.0.5-alpha)'
        required: true
      notes:
        description: 'Was ist neu?'
        required: true
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: ZIP erstellen
        run: |
          mkdir /tmp/NiceOne
          cp *.lua *.toc /tmp/NiceOne/
          cd /tmp
          zip -r NiceOne.zip NiceOne/
          mv NiceOne.zip $GITHUB_WORKSPACE/

     - name: Release auf GitHub erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ inputs.notes }}
          TAG: ${{ inputs.tag }}
        run: |
          printf '%s' "$NOTES" > /tmp/release_notes.txt
          gh release create "$TAG" NiceOne.zip \
            --title "$TAG" \
            --notes-file /tmp/release_notes.txt
            
      - name: Discord Nachricht senden
        env:
          NOTES: ${{ inputs.notes }}
          TAG: ${{ inputs.tag }}
          WEBHOOK: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"@here **NiceOne ${TAG} ist da!**\n\n${NOTES}\n\n📦 Download: https://github.com/csngg/NiceOne/releases/download/${TAG}/NiceOne.zip\"}" \
          "$WEBHOOK"
