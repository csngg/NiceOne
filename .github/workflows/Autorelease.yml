name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (z.B. 1.1.0-alpha)'
        required: true
      discord_msg:
        description: 'Kurze Discord Ankündigung (1-2 Sätze)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: ZIP erstellen
        run: |
          mkdir /tmp/NiceOne
          cp *.lua *.toc /tmp/NiceOne/
          cd /tmp
          zip -r NiceOne.zip NiceOne/
          mv NiceOne.zip $GITHUB_WORKSPACE/

      - name: Release auf GitHub erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" NiceOne.zip \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md

      - name: Discord Nachricht senden
  env:
    MSG: ${{ inputs.discord_msg }}
    TAG: ${{ inputs.tag }}
    WEBHOOK: ${{ secrets.WEBHOOK_URL }}
  run: |
    CONTENT=$(jq -n --arg tag "$TAG" --arg msg "$MSG" \
      '"@here **NiceOne \($tag) ist da!**\n\n\($msg)\n\n📦 Download: https://github.com/csngg/NiceOne/releases/download/\($tag)/NiceOne.zip\n📋 Release Notes: https://github.com/csngg/NiceOne/releases/tag/\($tag)"')
    curl -H "Content-Type: application/json" \
      -d "{\"content\": $CONTENT}" \
      "$WEBHOOK"
