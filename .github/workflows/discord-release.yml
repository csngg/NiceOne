name: Notify Discord on Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (z.B. 1.0.5-alpha)'
        required: true
      notes:
        description: 'Was ist neu? (Release Notes)'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord Nachricht senden
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content": "**NiceOne '${{ inputs.tag }}' ist da!**\n\n${{ inputs.notes }}\n\n📦 Download: https://github.com/csngg/NiceOne/releases/download/${{ inputs.tag }}/NiceOne.zip"
          }' \
          ${{ secrets.WEBHOOK_URL }}
