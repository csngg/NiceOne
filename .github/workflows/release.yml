name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (z.B. 1.0.5-alpha)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v3
        with:
          path: NiceOne

      - name: ZIP erstellen
        run: |
          zip -r NiceOne.zip NiceOne/ --exclude "NiceOne/.git/*" --exclude "NiceOne/.github/*"

      - name: Release auf GitHub erstellen
        run: |
          gh release create "${{ inputs.tag }}" NiceOne.zip \
            --title "${{ inputs.tag }}" \
            --notes "Alpha Release ${{ inputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
