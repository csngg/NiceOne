name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (z.B. 1.0.5-alpha)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: ZIP erstellen
        run: |
          mkdir ../NiceOne_pkg
          cp *.lua *.toc ../NiceOne_pkg/
          mkdir ../NiceOne_pkg_wrap
          mv ../NiceOne_pkg ../NiceOne_pkg_wrap/NiceOne
          cd ../NiceOne_pkg_wrap
          zip -r NiceOne.zip NiceOne/
          mv NiceOne.zip $GITHUB_WORKSPACE/

      - name: Release auf GitHub erstellen
        run: |
          gh release create "${{ inputs.tag }}" NiceOne.zip \
            --title "${{ inputs.tag }}" \
            --notes "Alpha Release ${{ inputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
